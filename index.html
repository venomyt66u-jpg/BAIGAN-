<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baigan | Baigan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #9d7dfa;
            --purple-glow: rgba(157, 125, 250, 0.4);
            --bg: #fcfcff;
            --text: #1a1a1a;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }

        body.baigan-mode {
            --bg: #0d011f;
            --text: #e0d5ff;
            --card-bg: #160235;
            --nav-bg: rgba(22, 2, 53, 0.9);
            --purple-glow: rgba(157, 125, 250, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; transition: all 0.5s ease; }

        /* --- Nav --- */
        nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: var(--nav-bg); padding: 12px 30px; border-radius: 50px; backdrop-filter: blur(15px); z-index: 1000; border: 1px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        nav a { text-decoration: none; color: var(--text); font-weight: 700; font-size: 0.85rem; }
        .mode-toggle { background: var(--accent); color: white; border: none; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 900; font-size: 0.75rem; }

        /* --- Hero --- */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .hero-center-piece { z-index: 100; text-align: center; display: flex; flex-direction: column; align-items: center; }
        #fly-img { width: clamp(180px, 25vw, 350px); filter: drop-shadow(0 0 15px var(--purple-glow)); animation: float 4s ease-in-out infinite; cursor: pointer; transition: 0.4s; }
        .glow-active { filter: drop-shadow(0 0 40px var(--accent)) brightness(1.2) !important; transform: scale(1.05); }
        .title-container { display: flex; gap: 5px; margin: 10px 0; }
        .letter { display: inline-block; font-size: clamp(4.5rem, 16vw, 11rem); font-weight: 900; color: var(--accent); animation: letter-bounce 3s infinite; animation-delay: calc(var(--i) * 0.1s); text-shadow: 0 10px 30px var(--purple-glow); cursor: pointer; transition: 0.3s; }
        .letter-pop { text-shadow: 0 0 40px var(--accent) !important; transform: scale(1.2) translateY(-10px) !important; color: #fff !important; }
        #form-img { width: clamp(160px, 22vw, 300px); filter: drop-shadow(0 0 20px var(--purple-glow)); animation: float 4s infinite reverse; cursor: pointer; transition: 0.6s cubic-bezier(0.5, -0.5, 0.5, 1.5); }
        .form-launch { transform: translateY(-100vh) rotate(720deg) scale(0); opacity: 0; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes letter-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- Blind Box Mint Details --- */
        .section { padding: 100px 10%; text-align: center; }
        .section h2 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 40px; color: var(--accent); }
        
        .mint-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .blind-box {
            background: var(--card-bg);
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 25px;
            border: 2px dashed var(--accent);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .blind-box:hover { transform: scale(1.02); background: rgba(157, 125, 250, 0.05); }

        /* حالة الصندوق المغلق */
        .box-closed { font-size: 3.5rem; font-weight: 900; color: var(--accent); opacity: 0.5; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }

        /* حالة الصندوق المفتوح */
        .box-content { display: none; text-align: center; animation: reveal 0.5s forwards; }
        .box-content h3 { font-size: 2.2rem; color: var(--accent); margin-bottom: 5px; }
        .box-content small { font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }

        @keyframes reveal {
            from { transform: scale(0.5) rotate(-10deg); opacity: 0; filter: blur(10px); }
            to { transform: scale(1) rotate(0); opacity: 1; filter: blur(0); }
        }

        .box-opened { border-style: solid; border-width: 2px; background: var(--card-bg); box-shadow: 0 10px 30px var(--purple-glow); }

        /* --- About & Social --- */
        .about-box { background: var(--card-bg); padding: 50px; border-radius: 40px; border: 1px solid var(--purple-glow); max-width: 800px; margin: 0 auto; }
        .social-links a { font-size: 3.5rem; color: var(--accent); margin: 0 20px; transition: 0.4s; }

        /* --- Orbit NFTs --- */
        .orbit-zone { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 50; }
        .nft-mini { position: absolute; width: clamp(60px, 10vw, 120px); pointer-events: auto; animation: drift 6s ease-in-out infinite; transition: 0.4s; }

        @media (max-width: 768px) { nav { width: 95%; bottom: 20px; top: auto; } }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#mint">Mint</a>
        <a href="#about">About</a>
        <a href="#community">Community</a>
        <button class="mode-toggle" onclick="toggleBaiganMood()">Baigan Mood</button>
    </nav>

    <section class="hero" id="home">
        <div class="orbit-zone" id="orbitZone"></div>
        <div class="hero-center-piece">
            <img src="FLY.png" id="fly-img" alt="FLY" onclick="triggerGlow()">
            <div class="title-container" id="titleContainer"></div>
            <img src="form.png" id="form-img" alt="FORM" onclick="launchForm()">
        </div>
    </section>

    <section class="section" id="mint">
        <h2>Mint Details</h2>
        <div class="mint-grid">
            <div class="blind-box" onclick="openBox(this)">
                <div class="box-closed">?</div>
                <div class="box-content">
                    <h3>3,333</h3>
                    <small>Supply</small>
                </div>
            </div>
            <div class="blind-box" onclick="openBox(this)">
                <div class="box-closed">?</div>
                <div class="box-content">
                    <h3>FREE</h3>
                    <small>Price</small>
                </div>
            </div>
            <div class="blind-box" onclick="openBox(this)">
                <div class="box-closed">?</div>
                <div class="box-content">
                    <h3>ETH</h3>
                    <small>Chain</small>
                </div>
            </div>
            <div class="blind-box" onclick="openBox(this)">
                <div class="box-closed">?</div>
                <div class="box-content">
                    <h3>TBA</h3>
                    <small>Mint Date</small>
                </div>
            </div>
        </div>
    </section>

    <section class="section" id="about">
        <h2>About Us</h2>
        <div class="about-box">
            <p style="font-size: 1.4rem; font-weight: 700; margin-bottom: 20px;">If you hate Baigan, you're ngmi. 🍆</p>
            <ul style="list-style: none; text-align: left; display: inline-block; font-weight: 600;">
                <li>• No roadmap, just vibes.</li>
                <li>• Zero expectations, 100% legit.</li>
                <li>• Just a Baigan, no cap. 💯</li>
            </ul>
        </div>
    </section>

    <section class="section" id="community">
        <h2>Community</h2>
        <div class="social-links">
            <a href="https://x.com/Oxbaigan" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://discord.gg/Rr7uCWwrAd" target="_blank"><i class="fab fa-discord"></i></a>
        </div>
    </section>

    <script>
        // وظيفة فتح الصناديق
        function openBox(element) {
            if(element.classList.contains('box-opened')) return; // منع إعادة الفتح
            
            const closedTag = element.querySelector('.box-closed');
            const content = element.querySelector('.box-content');
            
            closedTag.style.display = 'none';
            content.style.display = 'block';
            element.classList.add('box-opened');
            
            // اهتزاز بسيط عند الفتح
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function triggerGlow() {
            const fly = document.getElementById('fly-img');
            fly.classList.add('glow-active');
            setTimeout(() => fly.classList.remove('glow-active'), 600);
        }

        const str = "Baigan";
        const container = document.getElementById('titleContainer');
        str.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char;
            span.className = 'letter';
            span.style.setProperty('--i', i);
            span.onclick = function() {
                this.classList.add('letter-pop');
                setTimeout(() => this.classList.remove('letter-pop'), 400);
            };
            container.appendChild(span);
        });

        const orbit = document.getElementById('orbitZone');
        const pos = [{t:'10%', l:'5%'}, {t:'10%', r:'5%'}, {t:'45%', l:'2%'}, {t:'45%', r:'2%'}, {b:'10%', l:'5%'}, {b:'10%', r:'5%'}, {t:'25%', l:'12%'}, {t:'70%', r:'12%'}];
        for (let i = 1; i <= 8; i++) {
            const img = document.createElement('img');
            img.src = `nft${i}.png`;
            img.className = 'nft-mini';
            const p = pos[i-1];
            if(p.t) img.style.top = p.t;
            if(p.b) img.style.bottom = p.b;
            if(p.l) img.style.left = p.l;
            if(p.r) img.style.right = p.r;
            orbit.appendChild(img);
        }

        function toggleBaiganMood() {
            document.body.classList.toggle('baigan-mode');
            const btn = document.querySelector('.mode-toggle');
            btn.innerText = document.body.classList.contains('baigan-mode') ? "Light Mode" : "Baigan Mood";
        }

        function launchForm() {
            const form = document.getElementById('form-img');
            form.classList.add('form-launch');
            setTimeout(() => {
                window.open('https://baigan.xyz/form', '_blank');
                form.classList.remove('form-launch');
            }, 1200);
        }
    </script>
</body>
</html>
