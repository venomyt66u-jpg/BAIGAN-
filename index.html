<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAIGAN | OFFICIAL WL</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000; --accent: #8a2be2; --err: #ff4444; --card: rgba(255,255,255,0.9); --border: #000; --egg: 0.06; }
        [data-theme="dark"] { --bg: #050505; --text: #fff; --accent: #bc77ff; --card: rgba(15,15,15,0.9); --border: #fff; --egg: 0.12; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.3s; position: relative; }
        .bg-p { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); opacity: var(--egg); z-index: -1; font-size: 3.5rem; pointer-events: none; padding: 20px; justify-items: center; align-items: center; }
        .theme-btn { position: absolute; top: 20px; right: 20px; background: var(--text); color: var(--bg); border: none; padding: 8px 12px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.6rem; z-index: 100; }
        .container { width: 90%; max-width: 380px; background: var(--card); border: 4px solid var(--text); border-radius: 40px; padding: 30px; text-align: center; position: relative; box-shadow: 12px 12px 0px var(--text); backdrop-filter: blur(10px); }
        .char { display: inline-block; transition: 0.2s; cursor: crosshair; }
        .char:hover { color: var(--accent); transform: translateY(-5px) rotate(10deg); }
        h1 { font-family: 'Archivo Black', sans-serif; font-size: 3.2rem; line-height: 0.8; margin-bottom: 15px; text-transform: uppercase; }
        p { font-weight: 700; margin-bottom: 20px; font-size: 0.9rem; letter-spacing: 1px; }
        .logo { width: 70px; margin-bottom: 10px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .btn-m { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 18px; border-radius: 15px; font-family: 'Archivo Black', sans-serif; font-size: 1.1rem; cursor: pointer; box-shadow: 5px 5px 0px var(--accent); margin-top: 10px; transition: 0.2s; }
        .btn-m:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
        input { width: 100%; padding: 16px; border: 3px solid var(--text); border-radius: 15px; background: transparent; color: var(--text); font-weight: 700; text-align: center; margin-bottom: 10px; outline: none; }
        .page { display: none; }
        .page.active { display: block; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--err); color: #fff; padding: 30px; border-radius: 25px; text-align: center; font-family: 'Archivo Black'; max-width: 280px; }
    </style>
</head>
<body data-theme="light">

    <button class="theme-btn" onclick="toggleT()">MODE</button>
    <div class="bg-p" id="bgP"></div>

    <div id="modal" onclick="closeM()">
        <div class="modal-box"><div style="font-size: 2rem;">⚠️</div><div id="mText">ERROR</div></div>
    </div>

    <div class="container">
        <img src="form.png" class="logo">
        <div class="page active" id="p1">
            <h1 class="split">BAIGAN</h1><p>VIBE CHECK.</p>
            <button class="btn-m" onclick="go(2)">LFG</button>
        </div>

        <div class="page" id="p2">
            <h1 class="split">RAID</h1><p>DO IT.</p>
            <input type="text" id="linkVal" placeholder="X LINK">
            <button class="btn-m" onclick="go(3)">VERIFY</button>
        </div>

        <div class="page" id="p3">
            <h1 class="split">WALLET</h1><p>EVM ADDR.</p>
            <input type="text" id="wallet" placeholder="0x...">
            <button class="btn-m" id="submitBtn" onclick="finish()">SUBMIT</button>
        </div>

        <div class="page" id="p4">
            <h1 class="split">SICK!</h1><p>WL SECURED.</p>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/e1hntio0f889e"; 
        const WEB_URL = "https://discord.com/api/webhooks/1477268972922474516/T1_UylXreLzjJn0E9G9SZ1P8kDbzf8GFFZ7qFy5Ojca61oYLn7DevxImo4AtKdy6bd8i";

        window.onload = () => {
            for(let i=0; i<20; i++) { document.getElementById('bgP').innerHTML += '<div>🍆</div>'; }
            if(localStorage.getItem('registered') === 'true') go(4);
            initSplit();
        };

        function initSplit() {
            document.querySelectorAll('.split').forEach(h => {
                const t = h.innerText; h.innerHTML = '';
                t.split('').forEach(c => h.innerHTML += `<span class="char">${c}</span>`);
            });
        }

        function go(s) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('p' + s).classList.add('active'); initSplit(); }
        function toggleT() { document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function alertDegen(m) { document.getElementById('mText').innerText = m; document.getElementById('modal').style.display = 'flex'; }

        async function finish() {
            const w = document.getElementById('wallet').value.trim();
            const l = document.getElementById('linkVal').value.trim();
            const btn = document.getElementById('submitBtn');
            if(w.length < 30) return alertDegen('ADDR ERROR.');
            btn.disabled = true; btn.innerText = "SENDING...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"data": [{"WALLET": w}]})
                });

                fetch(WEB_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: "BAIGAN", embeds: [{title: "NEW WL", fields: [{name: "X", value: l}, {name: "Wallet", value: w}]}]})
                });

                if(res.ok) { localStorage.setItem('registered', 'true'); go(4); }
                else throw new Error();
            } catch (e) {
                alertDegen('CONNECTION ERROR. Check Share Settings!');
                btn.disabled = false; btn.innerText = "SUBMIT";
            }
        }
    </script>
</body>
</html>
