<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAIGAN - COMING SOON</title> 
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --text: #000; --accent: #8a2be2; --err: #ff4444;
            --card: rgba(255,255,255,0.9); --border: #000; --egg: 0.06;
        }
        [data-theme="dark"] {
            --bg: #050505; --text: #fff; --accent: #bc77ff;
            --card: rgba(15,15,15,0.9); --border: #fff; --egg: 0.12;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 0.3s; position: relative;
        }

        .bg-p { 
            position: fixed; inset: 0; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(5, 1fr);
            opacity: var(--egg); 
            z-index: -1; 
            font-size: 3.5rem; 
            pointer-events: none; 
            padding: 20px;
            justify-items: center;
            align-items: center;
        }

        .theme-btn { position: absolute; top: 20px; right: 20px; background: var(--text); color: var(--bg); border: none; padding: 8px 12px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.6rem; z-index: 100; }

        /* تنسيق صورة FLY الجديدة */
        .fly-icon {
            position: absolute;
            top: 10%;
            width: 60px;
            cursor: pointer;
            z-index: 10;
            animation: float-fly 4s infinite ease-in-out;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fly-icon:active {
            transform: scale(0.8) rotate(-10deg);
        }

        .container {
            width: 90%; max-width: 380px; background: var(--card); border: 4px solid var(--text); border-radius: 40px;
            padding: 40px 30px; text-align: center; position: relative; box-shadow: 12px 12px 0px var(--text);
            backdrop-filter: blur(10px); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char { 
            display: inline-block; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: crosshair;
            white-space: pre;
        }
        .char:hover { 
            color: var(--accent); 
            transform: translateY(-8px) scale(1.2) rotate(5deg); 
        }

        /* تعديل العناوين لجعل SOON في سطر منفصل */
        h1 { font-family: 'Archivo Black', sans-serif; font-size: 3rem; line-height: 1; margin-bottom: 15px; text-transform: uppercase; }
        .coming-text { font-size: 2.2rem; display: block; }
        .soon-text { font-size: 4rem; display: block; color: var(--accent); }

        .logo { width: 80px; margin-bottom: 20px; animation: float 3s infinite ease-in-out; }

        /* Animations */
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes float-fly { 
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -15px) rotate(5deg); }
            66% { transform: translate(-10px, 10px) rotate(-5deg); }
        }
        @keyframes pop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        
        /* انميشن عند الضغط */
        .click-pulse { animation: pulse-out 0.4s ease-out forwards; }
        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        .status-tag {
            display: inline-block; background: var(--text); color: var(--bg);
            padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 900;
            margin-bottom: 10px; text-transform: uppercase;
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-btn" onclick="toggleT()">MODE</button>
    <div class="bg-p" id="bgP"></div>

    <img src="FLY.png" class="fly-icon" id="flyImg" alt="Fly" onclick="goToSite(this)">

    <div class="container">
        <img src="form.png" class="logo">
        <div class="status-tag animate-text">System Offline</div>
        <h1>
            <span class="coming-text animate-text">COMING</span>
            <span class="soon-text animate-text">SOON</span>
        </h1>
        <p class="animate-text">REGISTRATION IS CURRENTLY CLOSED.</p>
        <div style="font-size: 0.7rem; opacity: 0.6; margin-top: 10px;" class="animate-text">STAY TUNED FOR UPDATES ON OUR X.</div>
    </div>

    <script>
        window.onload = () => {
            const bgContainer = document.getElementById('bgP');
            for(let i=0; i<20; i++) { bgContainer.innerHTML += '<div>🍆</div>'; }
            applyTextAnimation();
        };

        function applyTextAnimation() {
            document.querySelectorAll('.animate-text').forEach(el => {
                const text = el.innerText; 
                el.innerHTML = '';
                text.split('').forEach(char => {
                    const span = document.createElement('span');
                    span.className = 'char';
                    span.innerText = char === ' ' ? '\u00A0' : char;
                    el.appendChild(span);
                });
            });
        }

        function toggleT() { 
            document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light'; 
        }

        // وظيفة الانتقال مع الانميشن
        function goToSite(el) {
            el.classList.add('click-pulse');
            setTimeout(() => {
                window.location.href = 'https://Baigan.xyz';
            }, 300);
        }
    </script>
</body>
</html>
