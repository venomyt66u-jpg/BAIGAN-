<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAIGAN | WL</title> 
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #ffffff; --text: #000000; --accent: #bc77ff;
            --card: #f9f9f9; --border: #eeeeee; --egg-op: 0.05;
            --glow: 0 10px 30px rgba(0,0,0,0.05);
        }
        body.baigan-active {
            --bg: #1a0033; --text: #ffffff; --accent: #bc77ff;
            --card: #2d0055; --border: #4d008e; --egg-op: 0.2;
            --glow: 0 0 30px rgba(188, 119, 255, 0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Space Grotesk', sans-serif; font-weight: 900;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: all 0.6s ease;
        }
        .top-nav { position: fixed; top: 30px; z-index: 1000; }
        .mode-switch {
            background: var(--card); border: 2px solid var(--border);
            padding: 8px 16px; border-radius: 50px; color: var(--text);
            font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: var(--glow); transition: 0.3s; text-transform: uppercase;
        }
        .container {
            width: 90%; max-width: 380px; background: var(--card); 
            border: 3px solid var(--border); border-radius: 40px;
            padding: 50px 30px; text-align: center; box-shadow: var(--glow); position: relative;
        }
        .step { display: none; }
        .step.active { display: block; }
        .char { 
            display: inline-block; opacity: 0; transform: translateY(20px); 
            animation: charUp 0.4s forwards; white-space: pre; transition: 0.2s ease; cursor: default;
        }
        .char:hover { color: var(--accent); transform: translateY(-8px) scale(1.2); text-shadow: 0 0 10px var(--accent); }
        @keyframes charUp { to { opacity: 1; transform: translateY(0); } }
        .logo { width: 90px; margin-bottom: 25px; animation: float 4s infinite ease-in-out; }
        h2 { font-family: 'Archivo Black', sans-serif; font-size: 2.3rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: -1.5px; }
        p { font-size: 0.8rem; color: #888; margin-bottom: 30px; text-transform: uppercase; }
        .social-row { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .icon-btn {
            width: 65px; height: 65px; border: 2px solid var(--border); border-radius: 20px;
            display: inline-flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; font-size: 1.6rem; color: var(--text);
        }
        .icon-btn.done { background: var(--accent); border-color: var(--accent); color: #fff; }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: 2px solid var(--border);
            background: var(--bg); color: var(--text); font-weight: 900; margin-bottom: 15px; font-family: inherit;
        }
        .main-btn {
            width: 100%; padding: 20px; background: var(--text); color: var(--bg);
            border: none; border-radius: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .fly-img { width: 120px; cursor: pointer; margin-bottom: 20px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        .bg-p { position: fixed; inset: 0; display: grid; grid-template-columns: repeat(4, 1fr); opacity: var(--egg-op); z-index: -1; pointer-events: none; font-size: 3rem; }
    </style>
</head>
<body id="mainBody">

    <div class="top-nav">
        <div class="mode-switch" onclick="toggleBaiganMode()">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span id="modeTxt">Baigan Mode</span>
        </div>
    </div>

    <div class="bg-p" id="bgP"></div>

    <div class="container" id="formCard">
        <div class="step active" id="step1">
            <img src="form.png" class="logo">
            <h2 class="anim">BAIGAN</h2>
            <p>Enter your X username</p>
            <input type="text" id="usernameInput" placeholder="@USER">
            <button class="main-btn" onclick="validateUsername()">Next</button>
        </div>

        <div class="step" id="step2">
            <h2 class="anim">BAIGAN</h2>
            <p>Like & Retweet</p>
            <div class="social-row">
                <div class="icon-btn" onclick="socialAction(this, 'like', 'https://x.com/i/status/2029929522670305427')"><i class="fa-solid fa-heart"></i></div>
                <div class="icon-btn" onclick="socialAction(this, 'rt', 'https://x.com/i/status/2029929522670305427')"><i class="fa-solid fa-retweet"></i></div>
            </div>
            <button class="main-btn" id="next2" disabled onclick="go(3)">Verified</button>
        </div>

        <div class="step" id="step3">
            <h2 class="anim">BAIGAN</h2>
            <p>Comment & Tag friends</p>
            <div class="icon-btn" onclick="socialAction(this, 'comment', 'https://x.com/i/status/2029929522670305427')" style="margin-bottom: 20px;"><i class="fa-solid fa-comment"></i></div>
            <input type="text" id="linkInput" placeholder="Paste link here">
            <button class="main-btn" onclick="checkCommentLink()">Submit</button>
        </div>

        <div class="step" id="step4">
            <h2 class="anim">BAIGAN</h2>
            <p>Follow & Join</p>
            <div class="social-row">
                <div class="icon-btn" onclick="socialAction(this, 'follow', 'https://x.com/Oxbaigan')"><i class="fa-brands fa-x-twitter"></i></div>
                <div class="icon-btn" onclick="socialAction(this, 'discord', 'https://discord.gg/K5nvJRcesh')"><i class="fa-brands fa-discord"></i></div>
            </div>
            <button class="main-btn" id="next4" disabled onclick="go(5)">Next</button>
        </div>

        <div class="step" id="step5">
            <h2 class="anim">BAIGAN</h2>
            <p>Drop your ETH wallet</p>
            <input type="text" id="wallet" placeholder="0x...">
            <button class="main-btn" id="submitBtn" onclick="finalizeRegistration()">Register</button>
        </div>

        <div class="step" id="stepSuccess">
            <img src="FLY.png" class="fly-img" onclick="window.open('https://Baigan.xyz', '_blank')">
            <h2 class="anim">YOU'RE IN</h2>
            <p>Registration complete. LFG.</p>
            <button class="main-btn" style="background: var(--accent); color: #fff;" onclick="window.open('https://Baigan.xyz', '_blank')">Website</button>
        </div>
    </div>

    <script>
        // استبدل هذا الرابط برابط الـ Script الخاص بك
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwW_0pd2HaapXMPWeWFpRhNY3WzoKz04DTlSnhxcXf_Qa50tWa8A2_ha7p_9KEzGgl5gA/exec';
        
        let registrationData = { username: '', proofLink: '', wallet: '' };
        let gatedChecks = { step2: { like: false, rt: false }, step4: { follow: false, discord: false } };

        function getFingerprint() {
            return btoa(navigator.userAgent + (navigator.language || ''));
        }

        window.onload = () => {
            const fid = getFingerprint();
            if(localStorage.getItem('b_reg') || localStorage.getItem('fid_' + fid)) {
                go('Success');
            }
            applyTextEffect();
            for(let i=0; i<16; i++) document.getElementById('bgP').innerHTML += '<div>🍆</div>';
        };

        function applyTextEffect() {
            document.querySelectorAll('.anim').forEach(el => {
                const txt = el.innerText; el.innerHTML = '';
                txt.split('').forEach((char, i) => {
                    const s = document.createElement('span'); s.className = 'char';
                    s.style.animationDelay = (i * 0.05) + 's'; s.innerText = char === ' ' ? '\u00A0' : char;
                    el.appendChild(s);
                });
            });
        }

        function toggleBaiganMode() {
            document.body.classList.toggle('baigan-active');
            document.getElementById('modeTxt').innerText = document.body.classList.contains('baigan-active') ? "Normal Mode" : "Baigan Mode";
        }

        function go(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            const nextStep = (n === 'Success') ? document.getElementById('stepSuccess') : document.getElementById('step' + n);
            if(nextStep) { 
                nextStep.classList.add('active'); 
                applyTextEffect(); 
            }
        }

        function validateUsername() {
            const val = document.getElementById('usernameInput').value.trim();
            if(val.length > 1) { registrationData.username = val; go(2); }
        }

        function socialAction(el, type, url) {
            el.classList.add('done'); window.open(url, '_blank');
            if(type === 'like' || type === 'rt') {
                gatedChecks.step2[type] = true;
                if(gatedChecks.step2.like && gatedChecks.step2.rt) document.getElementById('next2').disabled = false;
            } else if(type === 'follow' || type === 'discord') {
                gatedChecks.step4[type] = true;
                if(gatedChecks.step4.follow && gatedChecks.step4.discord) document.getElementById('next4').disabled = false;
            }
        }

        function checkCommentLink() {
            const val = document.getElementById('linkInput').value.trim();
            if(val.includes('x.com') || val.includes('twitter.com')) { registrationData.proofLink = val; go(4); }
        }

        async function finalizeRegistration() {
            const val = document.getElementById('wallet').value.trim();
            const btn = document.getElementById('submitBtn');
            
            if(val.startsWith('0x') && val.length > 30) {
                registrationData.wallet = val;
                btn.innerText = "SENDING..."; btn.disabled = true;

                try {
                    // نستخدم fetch مع وضع text/plain لتفادي مشاكل الـ preflight OPTIONS
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(registrationData)
                    });

                    // نظراً لأن no-cors لا تعيد استجابة، ننتظر قليلاً ثم نعتبر العملية ناجحة
                    setTimeout(() => {
                        localStorage.setItem('b_reg', 'true');
                        localStorage.setItem('fid_' + getFingerprint(), 'true');
                        go('Success');
                    }, 1500);

                } catch (e) {
                    btn.innerText = "Error, Try Again"; btn.disabled = false;
                }
            } else {
                alert("Please enter a valid ETH address");
            }
        }
    </script>
</body>
</html>
